version: '3.8'

services:
  postgres:
    image: postgres:18-alpine
    container_name: db_financas
    environment:
      POSTGRES_DB: financas_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: