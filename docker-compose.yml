services:
  postgres:
    image: postgres:18-alpine
    container_name: db_financas
    environment:
      POSTGRES_DB: financas_db
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5454:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: