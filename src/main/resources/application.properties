spring.application.name=finance-dashboard

server.port=${PORT:8080}

# ==========================================
# CONEXAO COM O BANCO DE DADOS
# ==========================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# JPA / HIBERNATE
# ==========================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ==========================================
# FLYWAY
# ==========================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# ==========================================
# SPRING SECURITY ? JWT
# ==========================================
api.security.token.secret=${JWT_SECRET}

# ==========================================
# ACTUATOR
# ==========================================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ==========================================
# CORS ? configuravel via variavel de ambiente
# Exemplo: APP_CORS_ORIGINS=https://meuapp.com,https://www.meuapp.com
# ==========================================
app.cors.allowed-origins=${APP_CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# ==========================================
# RATE LIMIT
# Em producao, informe o IP do seu load balancer/proxy:
# APP_TRUSTED_PROXIES=10.0.0.1,10.0.0.2
# ==========================================
app.security.rate-limit.enabled=true
app.security.rate-limit.trusted-proxies=${APP_TRUSTED_PROXIES:}