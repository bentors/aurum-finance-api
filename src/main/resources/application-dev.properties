# ==========================================
# CONFIGURACOES EXCLUSIVAS DE DESENVOLVIMENTO
# ==========================================
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT secret local (nunca use este valor em producao!)
api.security.token.secret=dev-secret-local-nao-usar-em-producao

# Banco local
DB_URL=jdbc:postgresql://localhost:5432/finance_dev
DB_USER=postgres
DB_PASSWORD=postgres

# Actuator completo em dev
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always